}}var Mn=["A","B","C","D"],wo={A:{name:"Fuerza (autocarga)",icon:zt,color:"text-emerald-400"},B:{name:"Carrera + Agilidad (CAV)",icon:Rl,color:"text-amber-400"},C:{name:"HIIT",icon:Dl,color:"text-red-400"},D:{name:"Resistencia",icon:Hu,color:"text-sky-400"}},pS=["Flexiones en pared","Flexiones inclinadas (banco)","Flexiones con rodillas apoyadas","Flexiones negativas (exc\xE9ntricas)","Flexiones completas"],qp=["Plancha frontal","Plancha con rodillas apoyadas","Plancha lateral","Plancha con toque de hombro"],Up=["Sentadillas","Zancadas alternas","Puente de gl\xFAteo","Sentadilla isom\xE9trica en pared"],An=["Skipping alto + talones al gl\xFAteo","Carrera lateral + cruces","Zancadas de amplitud"],LS=["Sprints 30 m (85%)","Progresiones 40 m (60\u219290%)","Salidas reactivas 10 m"],xS=["5-10-5 cronometrado","Circuito CAV completo (crono)","Giros 180\xB0 + aceleraci\xF3n 10 m","Eslalon 12 m"],hS=["Trote continuo suave","Cambios de ritmo 1' fuerte / 1' suave"],Ep=["Burpees sin salto","Burpees completos","Sentadilla con salto","Jumping jacks"],Hp=["Mountain climbers","Rodillas al pecho en el sitio","Skaters (salto lateral)"],SS=["Carrera continua","CACO (correr / caminar)","Caminata r\xE1pida"],gS={"Flexiones en pared":"De pie frente a la pared, manos a la altura del pecho y cuerpo en una sola l\xEDnea. Flexiona los codos a 45\xB0 hasta casi tocar la pared y empuja. Progresa alejando los pies de la pared.","Flexiones inclinadas (banco)":"Manos sobre un banco, murete o escal\xF3n, cuerpo en tabla. Baja el pecho hacia el borde en 2-3 segundos controlados. Cuanto m\xE1s bajo sea el apoyo, m\xE1s dif\xEDcil: as\xED se progresa.","Flexiones con rodillas apoyadas":"Rodillas en el suelo y cuerpo recto de rodillas a cabeza (no dobles la cadera). El pecho baja casi hasta el suelo. Cuando hagas 4\xD710 limpias, pasa a las negativas.","Flexiones negativas (exc\xE9ntricas)":"Desde plancha alta, baja hasta el suelo en 4-5 segundos frenando todo el recorrido; sube ayud\xE1ndote de las rodillas. Es el puente directo hacia la flexi\xF3n completa.","Flexiones completas":"Cuerpo r\xEDgido como una tabla, manos bajo los hombros, codos a 45\xB0. El pecho toca casi el suelo y subes sin arquear la lumbar. Suma una repetici\xF3n por serie cada semana.","Plancha frontal":"Antebrazos en el suelo, gl\xFAteo y abdomen apretados, cuello neutro y mirada al suelo. No hundas la cadera ni la subas. Respira con normalidad. Progresi\xF3n: +5 segundos por semana hasta 90 s.","Plancha con rodillas apoyadas":"La misma postura pero apoyando las rodillas. \xDAsala si pierdes la l\xEDnea del cuerpo antes de completar el tiempo objetivo, y vuelve a la versi\xF3n completa en la siguiente serie.","Plancha lateral":"Apoyada en un antebrazo, cadera alta y cuerpo alineado de pies a cabeza. Hombro lejos de la oreja. Si falla, apoya la rodilla inferior. Trabaja siempre los dos lados.","Plancha con toque de hombro":"Desde plancha alta, toca el hombro contrario con la mano sin que la cadera se mueva. Es un ejercicio de antirrotaci\xF3n: prima la estabilidad, no la velocidad.",Sentadillas:"Pies al ancho de hombros, talones pegados al suelo. Baja hasta muslos paralelos con el pecho alto y sube apretando el gl\xFAteo. Ritmo 2-1-2: bajar, pausa, subir.","Zancadas alternas":"Paso amplio al frente, rodilla trasera casi al suelo y tronco vertical. Empuja con el tal\xF3n delantero para volver. Alterna piernas.","Puente de gl\xFAteo":"Tumbada boca arriba con rodillas flexionadas, eleva la cadera apretando el gl\xFAteo 1 segundo arriba. Protege la lumbar y complementa la plancha.","Sentadilla isom\xE9trica en pared":"Espalda pegada a la pared, muslos paralelos al suelo como si estuvieras sentada en una silla invisible. Aguanta el tiempo objetivo respirando con calma.","Skipping alto + talones al gl\xFAteo":"Alterna 10 s de rodillas altas con 10 s de talones al gl\xFAteo. Postura erguida, brazos a 90\xB0 y pisada bajo la cadera. Es la base t\xE9cnica de la carrera y del CAV.","Carrera lateral + cruces":"Desplazamiento lateral sin cruzar los apoyos, cadera baja; alterna con pasos cruzados. Prepara los giros del circuito de agilidad.","Zancadas de amplitud":"Zancadas de carrera amplias y el\xE1sticas, buscando volar entre apoyos sin frenar en cada uno. Mejora la econom\xEDa de zancada.","Sprints 30 m (85%)":"Acelera de forma progresiva hasta el 85% del m\xE1ximo y mant\xE9n la t\xE9cnica. Vuelve andando: la velocidad se entrena descansada, nunca con fatiga.","Progresiones 40 m (60\u219290%)":"Empieza al trote y termina casi al m\xE1ximo en 40 metros. La aceleraci\xF3n debe ser suave y continua, sin tirones.","Salidas reactivas 10 m":"Desde parada, reacciona a una se\xF1al (mental o de un compa\xF1ero) y acelera 10 m. Los dos primeros pasos deciden medio segundo del CAV.","5-10-5 cronometrado":"Corre 5 m, gira, vuelve 10 m, gira y remata 5 m. Frena en 2-3 apoyos cortos bajando el centro de gravedad. Cronom\xE9tralo siempre: es tu referencia del CAV.","Circuito CAV completo (crono)":"Monta el trazado oficial con marcas en el suelo y hazlo a m\xE1xima intensidad con cron\xF3metro. Descanso completo (2 min) entre intentos: buscamos calidad, no fatiga.","Giros 180\xB0 + aceleraci\xF3n 10 m":"Gira siempre mirando por encima del hombro interior y sal del giro ya acelerando, sin pasos de ajuste. Trabaja el doble tu lado malo.","Eslalon 12 m":"Curvas cerradas entre marcas imaginarias cada 2 m, apoyando el pie exterior para cambiar de direcci\xF3n. Simula el trazado del circuito oficial.","Trote continuo suave":"Ritmo conversacional: debes poder hablar frases completas. Si te falta el aire, ve m\xE1s despacio; el objetivo aqu\xED es sumar minutos, no velocidad.","Cambios de ritmo 1' fuerte / 1' suave":"Alterna 1 minuto a ritmo exigente (cuesta hablar) con 1 minuto muy suave. El tramo suave es la recuperaci\xF3n: no lo conviertas en caminar.","Burpees sin salto":"Apoya las manos, lleva los pies atr\xE1s a plancha, vuelve y ponte de pie. Domina este patr\xF3n antes de a\xF1adir el salto.","Burpees completos":"A\xF1ade el salto vertical final con palmada sobre la cabeza. Aterriza flexionando las rodillas y encadena la siguiente repetici\xF3n con ritmo.","Sentadilla con salto":"Desde media sentadilla, salta buscando altura y aterriza en silencio, amortiguando con rodillas y cadera. Si las rodillas molestan, cambia a sentadilla r\xE1pida sin salto.","Jumping jacks":"Salto abriendo piernas y brazos a la vez, ritmo constante y respiraci\xF3n fluida. Ideal para mantener pulsaciones entre ejercicios m\xE1s duros.","Mountain climbers":"En plancha alta, lleva las rodillas al pecho alternando r\xE1pido, con la cadera baja y estable. Si la cadera rebota, baja la velocidad.","Rodillas al pecho en el sitio":"Sprint est\xE1tico elevando las rodillas a la altura de la cadera, con braceo activo. Intensidad m\xE1xima en intervalos cortos.","Skaters (salto lateral)":"Salta lateralmente de una pierna a otra como una patinadora, aterrizando estable en un solo apoyo. Fortalece el tobillo para los giros del CAV.","Carrera continua":"Ritmo constante y c\xF3modo de principio a fin. Si necesitas parar, baja el ritmo antes que caminar. Hidr\xE1tate antes de salir si hace calor.","CACO (correr / caminar)":"Alterna bloques de carrera suave y caminata seg\xFAn el objetivo del d\xEDa. El caminar ES el descanso: no lo corras. Este m\xE9todo protege tendones y rodillas al empezar.","Caminata r\xE1pida":"Paso vivo con braceo activo. Es la opci\xF3n de descarga para d\xEDas de molestias o mucha fatiga acumulada."},Np=a=>Math.ceil(a/4),CS=a=>a<=2?0:a<=4?1:a<=6?2:a<=8?3:4;function zo(a){let e=Np(a),t=Mn[(a-1)%4],l=Math.min(90,15+(e-1)*5),u=(d,s,r,L,x=!0)=>({alts:d,altIdx:s,prog:x,sets:Array.from({length:r},()=>({val:"",done:!1})),target:L});if(t==="A"){let d=CS(e),s=["10-12 reps","8 reps","10 reps","5 bajadas de 4 s",`${Math.min(8,Math.max(4,e-6))} reps`][d];return{n:a,w:e,type:t,subtitle:`Progresi\xF3n de flexiones \xB7 plancha objetivo ${l} s`,exercises:[u(pS,d
